services:
  - type: web
    name: skinharmony-core-mcp
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run core:mcp
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: MCP_PUBLIC_URL
        value: https://skinharmony-core-mcp.onrender.com
      - key: AUTH0_ISSUER
        sync: false
      - key: AUTH0_AUDIENCE
        value: https://skinharmony-core-mcp.onrender.com/mcp
      - key: MCP_TENANT_CLAIM
        value: https://skinharmony.it/tenant_id
      - key: MCP_DEFAULT_TENANT_ID
        value: owner-private
      - key: MCP_CHATGPT_TENANT_ID
        value: codexai
      - key: MCP_SUPPORTED_SCOPES
        value: core:read,core:govern,workspace:read,workspace:write,task:read,task:write,agent:coordinate
      - key: NYRA_GOD_MODE_ENABLED
        value: "true"
      - key: NYRA_GOD_MODE_TENANT_ID
        value: owner-private
      - key: NYRA_GOD_MODE_CLIENT_IDS
        value: tpc_nSXQ4C5oyjBo77MhtJnWXE
      - key: NYRA_GOD_MODE_CODEX_ENABLED
        value: "true"
      - key: NYRA_GOD_MODE_EMERGENCY_STOP
        value: "false"
      - key: UNIVERSAL_CORE_URL
        value: https://skinharmony-universal-core.onrender.com
      - key: UNIVERSAL_CORE_KEYS_JSON
        sync: false
      - key: UNIVERSAL_CORE_KEY
        sync: false
      - key: SHARED_WORK_MEMORY_ROOT
        value: ./shared-work-memory
      - key: AGENT_WORKSPACE_ROOT
        sync: false
      - key: MEMORY_FABRIC_ROOT
        sync: false
      - key: MEMORY_RETENTION_DAYS
        value: "365"
      - key: MEMORY_PERSONAL_RETENTION_DAYS
        value: "90"
      - key: RESEARCH_CORTEX_ROOT
        sync: false
      - key: RESEARCH_RETENTION_DAYS
        value: "365"
      - key: NYRA_OPENAI_RESEARCH_ENABLED
        value: "false"
      - key: NYRA_OPENAI_RESEARCH_MODEL
        value: gpt-5.6
      - key: NYRA_OPENAI_RESEARCH_TIMEOUT_MS
        value: "90000"
      - key: NYRA_OPENAI_RESEARCH_MAX_CALLS_PER_HOUR
        value: "10"
      - key: OPENAI_API_KEY
        sync: false
