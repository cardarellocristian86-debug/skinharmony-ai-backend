services:
  - type: web
    name: skinharmony-nyra-core
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run nyra:render
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NYRA_STORAGE_ROOT
        value: /var/data
      - key: NYRA_FINANCE_SHARED_CAPITAL_EUR
        value: "1000000"
      - key: NYRA_WORLD_MARKET_CACHE_TTL_MS
        value: "900000"
      - key: NYRA_ASSET_HISTORY_CACHE_TTL_MS
        value: "86400000"
      - key: NYRA_WORLD_PAPER_AUTOSTART
        value: "true"
      - key: NYRA_WORLD_PAPER_RUN_ON_BOOT
        value: "false"
      - key: NYRA_WORLD_PAPER_INTERVAL_MINUTES
        value: "60"
      - key: NYRA_ENABLE_BASIC_AUTH
        value: "true"
      - key: NYRA_DISABLE_BASIC_AUTH
        value: "false"
      - key: NYRA_BASIC_USER
        sync: false
      - key: NYRA_BASIC_PASSWORD
        sync: false
      - key: NYRA_API_KEYS
        sync: false
      - key: NYRA_ANALYZER_API_KEYS
        sync: false
      - key: NYRA_RATE_LIMIT_PER_MINUTE
        value: "240"
      - key: NYRA_BODY_LIMIT
        value: "1mb"
      - key: NYRA_CORE_URL
        value: "https://skinharmony-universal-core.onrender.com"
      - key: NYRA_CORE_KEY
        sync: false
      - key: NYRA_CORE_TENANT_ID
        value: "codexai"
    disk:
      name: nyra-core-data
      mountPath: /var/data
      sizeGB: 10
