services:
  - type: web
    name: skinharmony-nyra-core
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run nyra:render
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NYRA_SERVICE_NAME
        value: nyra-horizontal-runtime
      - key: NYRA_DOMAIN_PACK_ID
        value: skinharmony
      - key: NYRA_DEEP_BRANCH_V2_ENABLED
        value: "false"
      - key: NYRA_DEEP_BRANCH_V2_MODE
        value: shadow
      - key: NYRA_DEEP_BRANCH_V2_BRANCHES
        value: context_intelligence,work_intake,research_evidence,decision_reasoning,planning_prioritization,risk_governance,delegated_authority,decision_provenance,execution_planning,parallel_coordination,quality_verification,learning_memory,adaptive_learning,communication_explanation,software_intelligence,suite_domain,smartdesk_domain,analyzer_domain
      - key: NYRA_DEEP_BRANCH_V2_TENANT_ALLOWLIST
        value: codexai
      - key: NYRA_DEEP_BRANCH_V2_FEDERATION_ENABLED
        value: "false"
      - key: NYRA_DEEP_BRANCH_V2_FEDERATION_TENANT_ALLOWLIST
        value: codexai
      # The signed L2–L4 evaluator is a distinct stage. It remains disabled
      # until Core ALLOWs the exact release/configuration action and the owner
      # explicitly confirms it; it cannot authorize execution in any mode.
      - key: NYRA_DEEP_BRANCH_V2_OPERATIONAL_EVALUATION_ENABLED
        value: "false"
      - key: NYRA_DEEP_BRANCH_V2_OPERATIONAL_EVALUATION_TENANT_ALLOWLIST
        value: codexai
      - key: NYRA_DEEP_BRANCH_V2_OPERATIONAL_ATTESTATION_MAX_AGE_MS
        value: "60000"
      # Populate these manually with the Core signer key id and the matching
      # JSON public-key map after that keypair exists; never generate them in
      # the Nyra service.
      - key: NYRA_DEEP_BRANCH_V2_CORE_ATTESTATION_KEY_ID_ALLOWLIST
        sync: false
      - key: NYRA_DEEP_BRANCH_V2_CORE_ATTESTATION_PUBLIC_KEYS
        sync: false
      - key: NYRA_DEEP_BRANCH_V2_CORE_SHARED_SECRET
        fromService:
          type: web
          name: skinharmony-universal-core
          envVarKey: CORE_NYRA_DEEP_BRANCH_V2_SERVICE_KEY
      - key: NYRA_STORAGE_ROOT
        value: /var/data
      - key: NYRA_FINANCE_SHARED_CAPITAL_EUR
        value: "1000000"
      - key: NYRA_WORLD_MARKET_CACHE_TTL_MS
        value: "900000"
      - key: NYRA_ASSET_HISTORY_CACHE_TTL_MS
        value: "86400000"
      - key: NYRA_WORLD_PAPER_AUTOSTART
        value: "true"
      - key: NYRA_WORLD_PAPER_RUN_ON_BOOT
        value: "false"
      - key: NYRA_WORLD_PAPER_INTERVAL_MINUTES
        value: "60"
      - key: NYRA_ENABLE_BASIC_AUTH
        value: "true"
      - key: NYRA_DISABLE_BASIC_AUTH
        value: "false"
      - key: NYRA_BASIC_USER
        sync: false
      - key: NYRA_BASIC_PASSWORD
        sync: false
      - key: NYRA_API_KEYS
        sync: false
      - key: NYRA_ANALYZER_API_KEYS
        sync: false
      - key: NYRA_RATE_LIMIT_PER_MINUTE
        value: "240"
      - key: NYRA_BODY_LIMIT
        value: "1mb"
      - key: NYRA_CORE_URL
        value: "https://skinharmony-universal-core.onrender.com"
      - key: NYRA_CORE_KEY
        sync: false
      - key: NYRA_CORE_TENANT_ID
        value: "codexai"
      - key: NYRA_RESEARCH_MCP_URL
        value: "https://skinharmony-core-mcp.onrender.com"
      - key: NYRA_SUITE_CORE_URL
        value: "https://skinharmony-universal-core.onrender.com"
      - key: NYRA_SUITE_CORE_KEY
        sync: false
      - key: NYRA_SUITE_CORE_TENANT_ID
        value: "skinharmony-suite"
      - key: NYRA_SUITE_BRIDGE_KEY
        sync: false
      - key: SMARTDESK_URL
        value: "https://skinharmony-smartdesk-live.onrender.com"
      - key: SMARTDESK_BRIDGE_API_KEY
        sync: false
      - key: WP_URL
        value: "https://www.skinharmony.it"
      - key: WP_USER
        sync: false
      - key: WP_APP_PASSWORD
        sync: false
    disk:
      name: nyra-core-data
      mountPath: /var/data
      sizeGB: 10
