name: Intelligence Spine

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "services/universal-core-service/**"
      - ".github/workflows/intelligence-spine.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shadow-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Verify intelligence spine contracts
        run: |
          node --experimental-strip-types services/universal-core-service/test/intelligence-spine-test.js
          node --experimental-strip-types services/universal-core-service/test/intelligence-spine-http-test.js
