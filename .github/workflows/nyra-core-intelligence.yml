name: Nyra Core Intelligence

on:
  pull_request:
    paths:
      - "render-core-mcp.yaml"
      - "services/skinharmony-core-mcp/**"
      - "services/universal-core-service/**"
      - ".github/workflows/nyra-core-intelligence.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  universal-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/universal-core-service
    steps:
      - uses: actions/checkout@v4
      - name: Validate MCP default tenant blueprint invariant
        shell: ruby {0}
        run: |
          require "yaml"

          path = File.join(ENV.fetch("GITHUB_WORKSPACE"), "render-core-mcp.yaml")
          blueprint = YAML.safe_load(File.read(path))
          services = blueprint.fetch("services")
          abort("services must be an array") unless services.is_a?(Array)

          mcp_services = services.select do |service|
            service.is_a?(Hash) && service["name"] == "skinharmony-core-mcp"
          end
          bindings = services.flat_map do |service|
            next [] unless service.is_a?(Hash)

            Array(service["envVars"])
              .select { |entry| entry.is_a?(Hash) && entry["key"] == "MCP_DEFAULT_TENANT_ID" }
              .map { |entry| [service["name"], entry] }
          end
          expected = [["skinharmony-core-mcp", {
            "key" => "MCP_DEFAULT_TENANT_ID",
            "value" => "codexai"
          }]]
          abort("invalid MCP_DEFAULT_TENANT_ID binding") unless mcp_services.length == 1 && bindings == expected
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/universal-core-service/package-lock.json
      - name: Build governed Rust extractor
        working-directory: .
        run: bash scripts/build-rust-extractor-render.sh
      - run: npm ci
      - run: npm test

  core-mcp:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skinharmony_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skinharmony_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CORE_MCP_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/skinharmony_test
    defaults:
      run:
        working-directory: services/skinharmony-core-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Universal Core dependencies for integration tests
        run: npm ci --prefix ../universal-core-service
      - run: npm install --ignore-scripts
      - run: npm test
