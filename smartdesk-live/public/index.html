<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkinHarmony Web</title>
    <script src="/assets/gold-bridge.js" defer></script>
    <script type="module" crossorigin src="/assets/index-CjHkLQDP.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/react-vendor-DnVCu7eN.js">
    <link rel="modulepreload" crossorigin href="/assets/router-7jOu5GCn.js">
    <link rel="modulepreload" crossorigin href="/assets/state-BLuW6sBf.js">
    <link rel="stylesheet" crossorigin href="/assets/index-BAq1gBBI.css">
    <style>
      .global-ai-assistant {
        display: none !important;
      }
    </style>
    <script>
      (function () {
        if (window.location.pathname !== "/ai-gold") return;

        function hideAiGoldChatUi() {
          const patterns = [
            /chiedi/i,
            /scrivi una domanda/i,
            /domanda operativa/i,
            /ask ai/i
          ];

          const maybeHide = (node) => {
            if (!node || node.dataset?.aiGoldChatHidden === "1") return;
            const text = [node.textContent || "", node.getAttribute?.("placeholder") || ""].join(" ").trim();
            if (!patterns.some((pattern) => pattern.test(text))) return;
            const block = node.closest("form, section, article, .card, .consultation-box, .stack, .two-col, .list-item") || node.parentElement;
            if (!block) return;
            block.style.display = "none";
            block.dataset.aiGoldChatHidden = "1";
          };

          document.querySelectorAll("button, input, textarea, form").forEach(maybeHide);
        }

        fetch("/api/auth/session", {
          headers: {
            Authorization: window.localStorage.getItem("skinharmony-web-token")
              ? "Bearer " + window.localStorage.getItem("skinharmony-web-token")
              : ""
          }
        })
          .then((res) => (res.ok ? res.json() : null))
          .then((session) => {
            if (!session || String(session.role || "").toLowerCase() === "superadmin") return;
            hideAiGoldChatUi();
            new MutationObserver(hideAiGoldChatUi).observe(document.documentElement, { childList: true, subtree: true });
          })
          .catch(() => {});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
