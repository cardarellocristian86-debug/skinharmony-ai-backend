<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Desk | Fleet Intelligence</title>
  <style>
    :root {
      --blue: #2fabc8;
      --dark: #163747;
      --muted: #5d7380;
      --line: rgba(121,159,184,.22);
      --soft: #f3f9fc;
      --green: #2f9f63;
      --amber: #bf8428;
      --red: #bd3f36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--dark);
      background: radial-gradient(circle at top left, rgba(189,229,255,.82), rgba(247,251,255,.95) 42%, #eef5f9);
    }
    main { width: min(1180px, calc(100vw - 32px)); margin: 0 auto; padding: 34px 0 48px; }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    h1 { margin: 0; font-size: clamp(32px, 5vw, 56px); letter-spacing: -.055em; line-height: .96; }
    p { color: var(--muted); line-height: 1.6; margin: 8px 0 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(47,171,200,.13);
      color: #26758b;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: 1px solid rgba(47,171,200,.22);
      white-space: nowrap;
    }
    .grid { display: grid; gap: 16px; }
    .cards { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .panel {
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 24px 70px rgba(30,72,94,.10);
    }
    .metric { font-size: 34px; font-weight: 900; letter-spacing: -.05em; }
    .label { color: var(--muted); font-size: 13px; font-weight: 700; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 18px 0; }
    button, input {
      border: 1px solid var(--line);
      border-radius: 14px;
      min-height: 44px;
      padding: 0 14px;
      font: inherit;
      background: white;
      color: var(--dark);
    }
    button {
      background: linear-gradient(135deg, rgba(126,211,229,.94), rgba(47,171,200,.96));
      color: white;
      border: 0;
      cursor: pointer;
      font-weight: 800;
    }
    .center-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .center-card {
      border: 1px solid rgba(121,159,184,.16);
      border-radius: 18px;
      background: rgba(247,250,253,.92);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .center-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .center-card-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .center-card-subtitle {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    .center-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .center-card-metric {
      border-radius: 14px;
      border: 1px solid rgba(121,159,184,.14);
      background: #fff;
      padding: 10px 12px;
    }
    .center-card-metric .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .center-card-metric .metric-value {
      font-size: 14px;
      font-weight: 800;
      color: var(--dark);
    }
    .dot { width: 10px; height: 10px; display: inline-block; border-radius: 99px; margin-right: 8px; }
    .green { background: var(--green); }
    .yellow { background: var(--amber); }
    .red { background: var(--red); }
    .muted { color: var(--muted); }
    .split { grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr); }
    .list { display: grid; gap: 10px; }
    .item { padding: 14px; border-radius: 18px; background: var(--soft); border: 1px solid var(--line); }
    .item strong { display: block; margin-bottom: 4px; }
    @media (max-width: 820px) {
      header, .split { grid-template-columns: 1fr; display: grid; }
      .cards { grid-template-columns: 1fr 1fr; }
      .center-list, .center-card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <span class="badge">SUPER ADMIN FLEET</span>
        <h1>Fleet Intelligence</h1>
        <p>God Mode read-only sopra Gold State, PIAL e Decision Layer. Nessuna modifica ai dati dei centri.</p>
      </div>
      <span class="badge" id="status">lettura...</span>
    </header>

    <div class="toolbar">
      <input id="centerIds" placeholder="Filtro centerIds opzionale, separati da virgola" style="min-width:320px; flex:1" />
      <input id="fleetId" placeholder="fleetId futuro" />
      <button id="reload">Aggiorna</button>
    </div>

    <section class="grid cards">
      <div class="panel"><div class="label">Centri</div><div class="metric" id="totalCenters">-</div></div>
      <div class="panel"><div class="label">Verdi</div><div class="metric" id="greenCount">-</div></div>
      <div class="panel"><div class="label">Gialli</div><div class="metric" id="yellowCount">-</div></div>
      <div class="panel"><div class="label">Rossi</div><div class="metric" id="redCount">-</div></div>
    </section>

    <section class="grid split" style="margin-top:16px">
      <div class="panel">
        <h2>Centri</h2>
        <div id="centers" class="center-list"></div>
      </div>
      <div class="grid">
        <div class="panel">
          <h2>Maturity</h2>
          <div id="maturity" class="list"></div>
        </div>
        <div class="panel">
          <h2>Alert rete</h2>
          <div id="alerts" class="list"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const token = window.localStorage.getItem("skinharmony-web-token") || "";
    const $ = (id) => document.getElementById(id);
    const api = async (path) => {
      const response = await fetch(path, { headers: { Authorization: `Bearer ${token}` } });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    };
    const query = () => {
      const params = new URLSearchParams();
      if ($("centerIds").value.trim()) params.set("centerIds", $("centerIds").value.trim());
      if ($("fleetId").value.trim()) params.set("fleetId", $("fleetId").value.trim());
      const q = params.toString();
      return q ? `?${q}` : "";
    };
    const pct = (n) => `${Math.round(Number(n || 0) * 100)}%`;
    async function load() {
      $("status").textContent = "caricamento";
      const q = query();
      const [overview, maturity, alerts] = await Promise.all([
        api(`/api/fleet/overview${q}`),
        api(`/api/fleet/maturity${q}`),
        api(`/api/fleet/alerts${q}`)
      ]);
      $("totalCenters").textContent = overview.totalCenters;
      $("greenCount").textContent = overview.counts.green || 0;
      $("yellowCount").textContent = overview.counts.yellow || 0;
      $("redCount").textContent = overview.counts.red || 0;
      $("centers").innerHTML = overview.centers.map((center) => `
        <div class="center-card">
          <div class="center-card-head">
            <div>
              <div class="center-card-title"><span class="dot ${center.status}"></span>${center.centerName}</div>
              <div class="center-card-subtitle">${center.centerId}</div>
            </div>
            <div class="badge">${center.plan}</div>
          </div>
          <div class="center-card-grid">
            <div class="center-card-metric"><div class="metric-label">Maturity</div><div class="metric-value">${pct(center.maturityScore)}</div></div>
            <div class="center-card-metric"><div class="metric-label">Livello</div><div class="metric-value">${center.activationCode || `L${center.activationLevel}`}</div></div>
            <div class="center-card-metric"><div class="metric-label">State</div><div class="metric-value">${center.stateAvailable ? `seq ${center.eventSeq}` : "assente"}</div></div>
          </div>
          <div class="center-card-subtitle">${center.topAlert ? center.topAlert.message : "nessun alert"}</div>
        </div>
      `).join("");
      $("maturity").innerHTML = [
        `<div class="item"><strong>Media maturity</strong>${pct(maturity.averageMaturity)}</div>`,
        `<div class="item"><strong>Distribuzione</strong>${Object.entries(maturity.distribution).map(([k,v]) => `${k}: ${v}`).join(" · ")}</div>`,
        `<div class="item"><strong>Centri bloccati</strong>${maturity.blockedCenters.length}</div>`
      ].join("");
      $("alerts").innerHTML = [
        `<div class="item"><strong>Critici</strong>${alerts.critical.length}</div>`,
        `<div class="item"><strong>Warning</strong>${alerts.warnings.length}</div>`,
        `<div class="item"><strong>Info</strong>${alerts.info.length}</div>`
      ].join("");
      $("status").textContent = "read-only";
    }
    $("reload").addEventListener("click", () => load().catch((error) => {
      $("status").textContent = "errore";
      alert(error.message || error);
    }));
    load().catch((error) => {
      $("status").textContent = "accesso negato";
      $("centers").innerHTML = `<div class="item">${String(error.message || error)}</div>`;
    });
  </script>
</body>
</html>
